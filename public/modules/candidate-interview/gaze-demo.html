<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gaze Tracker Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; background: #0f172a; color: #e2e8f0; }
    video { width: min(640px, 100%); border-radius: 12px; background: #000; }
    pre { background: #1e293b; padding: 1rem; border-radius: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Gaze Tracker Demo</h1>
  <p>Open DevTools console to see gaze ratios. Look down/left/right to trigger flags.</p>
  <video id="cam" autoplay playsinline muted></video>
  <pre id="status">Starting…</pre>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="/modules/candidate-interview/js/gaze-cheat-detector.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const cam = new GazeTracking.AssessmentCamera(document.getElementById('cam'), {
      debug: true,
      onFlag: (event) => {
        statusEl.textContent = JSON.stringify(event, null, 2);
        console.warn('[GazeFlag]', event);
      },
    });
    cam.start().catch((e) => {
      statusEl.textContent = e.message;
    });
  </script>
</body>
</html>
